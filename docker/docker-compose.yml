services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ../.env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:${SUPABASE_DB_PORT:-54322}/postgres
      REDIS_URL: redis://redis:${REDIS_PORT:-6379}/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      SUPABASE_URL: http://host.docker.internal:54321
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      PLAYGROUND_ENABLED: ${PLAYGROUND_ENABLED:-false}
    volumes:
      - ../backend:/app
      - backend_venv:/app/.venv
    depends_on:
      redis:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    env_file:
      - ../.env.local
    environment:
      VITE_API_URL: http://backend:8000
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    extra_hosts:
      - "host.docker.internal:host-gateway"

  celery_worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: uv run celery -A app.celery_app worker --loglevel=info
    env_file:
      - ../.env.local
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:${SUPABASE_DB_PORT:-54322}/postgres
      REDIS_URL: redis://redis:${REDIS_PORT:-6379}/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    volumes:
      - ../backend:/app
      - backend_venv:/app/.venv
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  chainlit:
    build:
      context: ../chainlit
      dockerfile: Dockerfile
    ports:
      - "${CHAINLIT_PORT:-8001}:8000"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - playground

volumes:
  redis_data:
  minio_data:
  frontend_node_modules:
  backend_venv:
