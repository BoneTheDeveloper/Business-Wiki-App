name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Backend Tests (SQLite — fast, no Docker) ───────────────
  backend-test:
    name: Backend Tests (SQLite)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run tests with coverage
        run: |
          uv run pytest tests/ -v --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=50

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml

  # ── Backend Integration Tests (PostgreSQL + pgvector) ──────
  backend-test-pgvector:
    name: Backend Tests (PG + pgvector)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --dev

      # Runs @pytest.mark.pgvector tests via testcontainers (PostgreSQL + pgvector).
      - name: Run pgvector tests
        env:
          TEST_USE_DOCKER: "true"
        run: |
          uv run pytest tests/ -v --tb=short -m pgvector
          exit_code=$?
          # Exit 5 = no tests collected (should not happen, but tolerate)
          if [ $exit_code -eq 5 ]; then
            echo "::warning::No pgvector tests were collected"
            exit 0
          fi
          exit $exit_code

  # ── Frontend Lint & Build ──────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
